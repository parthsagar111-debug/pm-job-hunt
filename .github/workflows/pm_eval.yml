name: PM Eval — India Jobs

on:
  schedule:
    - cron: '0 * * * *'     # every 1 hour
  workflow_dispatch:          # manual trigger from GitHub UI anytime

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Keep repo active (prevents GitHub disabling scheduled workflows)
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git commit --allow-empty -m "keep-alive $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push origin master

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Chrome (for Selenium — Naukri/Hirist/IIMJobs)
        run: |
          wget -q -O - https://dl.google.com/linux/linux_signing_key.pub | sudo apt-key add -
          sudo sh -c 'echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main" >> /etc/apt/sources.list.d/google-chrome.list'
          sudo apt-get update -q
          sudo apt-get install -y google-chrome-stable

      - name: Install Python dependencies
        run: pip install -r requirements_hosted.txt

      - name: Install Playwright browser
        run: playwright install chromium --with-deps

      - name: Run PM Eval
        env:
          ANTHROPIC_API_KEY:           ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          PM_EVAL_SPREADSHEET_ID:      ${{ secrets.PM_EVAL_SPREADSHEET_ID }}
          NTFY_TOPIC:                  ${{ secrets.NTFY_TOPIC }}
        run: python pm_eval_hosted.py
