name: LinkedIn Global — Worldwide PM Jobs

on:
  workflow_dispatch:   # triggered externally by cron-job.org via GitHub API

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install -r requirements_hosted.txt

      - name: Install Playwright browser
        run: playwright install chromium --with-deps

      - name: Run LinkedIn Global
        env:
          ANTHROPIC_API_KEY:           ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GLOBAL_SPREADSHEET_ID:       ${{ secrets.GLOBAL_SPREADSHEET_ID }}
          NTFY_TOPIC:                  ${{ secrets.NTFY_TOPIC }}
        run: python linkedin_global_hosted.py
