name: LinkedIn Global — Worldwide PM Jobs

on:
  schedule:
    - cron: '30 */2 * * *'  # every 2 hours, offset by 30 mins from pm_eval
  workflow_dispatch:          # manual trigger from GitHub UI anytime

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 60       # global script fetches more JDs so needs longer

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install -r requirements_hosted.txt

      - name: Install Playwright browser
        run: playwright install chromium --with-deps

      - name: Run LinkedIn Global
        env:
          ANTHROPIC_API_KEY:           ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GLOBAL_SPREADSHEET_ID:       ${{ secrets.GLOBAL_SPREADSHEET_ID }}
          NTFY_TOPIC:                  ${{ secrets.NTFY_TOPIC }}
        run: python linkedin_global_hosted.py
